name: Diagnostico Instagram 2

on:
  workflow_dispatch:

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar cuenta de Instagram vinculada a la pagina
        env:
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        run: |
          echo "== Pagina + cuenta de Instagram vinculada =="
          curl -s "https://graph.facebook.com/v19.0/$FACEBOOK_PAGE_ID?fields=name,instagram_business_account&access_token=$FACEBOOK_ACCESS_TOKEN"
          echo ""

