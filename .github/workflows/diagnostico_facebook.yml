name: Diagnostico Token Facebook

on:
  workflow_dispatch:

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar token de la pagina
        env:
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        run: |
          echo "== /me con el token =="
          curl -s "https://graph.facebook.com/v19.0/me?access_token=$FACEBOOK_ACCESS_TOKEN"
          echo ""
          echo ""
          echo "== info de la pagina (usando FACEBOOK_PAGE_ID) =="
          curl -s "https://graph.facebook.com/v19.0/$FACEBOOK_PAGE_ID?fields=name,id&access_token=$FACEBOOK_ACCESS_TOKEN"
          echo ""
