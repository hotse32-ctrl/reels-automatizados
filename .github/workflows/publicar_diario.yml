name: Generar y Publicar Reel Diario

# 10 publicaciones al dia, una por tema, en el horario pedido por Jose
# (primer video a las 8:00 hora Chile, siguientes cada 1h36m).
# Los horarios de cron son en UTC. Conversion usada (invierno en Chile,
# UTC-4): hora Chile + 4 horas = hora UTC.
# OJO: cuando Chile entre en horario de verano (UTC-3, oct-mar) estos
# crons van a publicar 1 hora mas tarde en hora local -- hay que restar
# 1 hora a cada uno (o sumar 3 en vez de 4) si se quiere mantener la
# misma hora local todo el ano.
#
# Tema 1  -> 8:00  Chile -> 12:00 UTC
# Tema 2  -> 9:36  Chile -> 13:36 UTC
# Tema 3  -> 11:12 Chile -> 15:12 UTC
# Tema 4  -> 12:48 Chile -> 16:48 UTC
# Tema 5  -> 14:24 Chile -> 18:24 UTC
# Tema 6  -> 16:00 Chile -> 20:00 UTC
# Tema 7  -> 17:36 Chile -> 21:36 UTC
# Tema 8  -> 19:12 Chile -> 23:12 UTC
# Tema 9  -> 20:48 Chile -> 00:48 UTC (dia siguiente)
# Tema 10 -> 22:24 Chile -> 02:24 UTC (dia siguiente)

on:
  schedule:
    - cron: '0 12 * * *'
    - cron: '36 13 * * *'
    - cron: '12 15 * * *'
    - cron: '48 16 * * *'
    - cron: '24 18 * * *'
    - cron: '0 20 * * *'
    - cron: '36 21 * * *'
    - cron: '12 23 * * *'
    - cron: '48 0 * * *'
    - cron: '24 2 * * *'
  workflow_dispatch:
    inputs:
      tema:
        description: 'ID del tema a publicar (1-10). Vacio = automatico segun el horario que disparo el run.'
        required: false
        default: ''

# contents: write es necesario para que GITHUB_TOKEN pueda crear y borrar
# el Release temporal que usa publicar_instagram_todo() en generar_reel_v2.py
# para darle a la API de Instagram una URL publica del video.
permissions:
  contents: write

jobs:
  generar-y-publicar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Determinar tema segun el horario que disparo este run
        id: tema
        run: |
          if [ -n "${{ github.event.inputs.tema }}" ]; then
            echo "id=${{ github.event.inputs.tema }}" >> "$GITHUB_OUTPUT"
          else
            case "${{ github.event.schedule }}" in
              "0 12 * * *") echo "id=1" >> "$GITHUB_OUTPUT" ;;
              "36 13 * * *") echo "id=2" >> "$GITHUB_OUTPUT" ;;
              "12 15 * * *") echo "id=3" >> "$GITHUB_OUTPUT" ;;
              "48 16 * * *") echo "id=4" >> "$GITHUB_OUTPUT" ;;
              "24 18 * * *") echo "id=5" >> "$GITHUB_OUTPUT" ;;
              "0 20 * * *") echo "id=6" >> "$GITHUB_OUTPUT" ;;
              "36 21 * * *") echo "id=7" >> "$GITHUB_OUTPUT" ;;
              "12 23 * * *") echo "id=8" >> "$GITHUB_OUTPUT" ;;
              "48 0 * * *") echo "id=9" >> "$GITHUB_OUTPUT" ;;
              "24 2 * * *") echo "id=10" >> "$GITHUB_OUTPUT" ;;
              *) echo "id=1" >> "$GITHUB_OUTPUT" ;;
            esac
          fi
          echo "Tema elegido: $(cat $GITHUB_OUTPUT | tail -n1)"

      - name: Esperar un desfase aleatorio (5 a 20 minutos, para que no sea siempre exacto)
        run: |
          MINUTOS=$(( (RANDOM % 16) + 5 ))
          echo "Esperando $MINUTOS minutos antes de generar y publicar..."
          sleep "$((MINUTOS * 60))"

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install requests google-generativeai Pillow numpy "moviepy==1.0.3" imageio_ffmpeg edge-tts google-auth-oauthlib google-api-python-client

      - name: Generar y publicar (Tema ${{ steps.tema.outputs.id }})
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python generar_reel_v2.py --tema ${{ steps.tema.outputs.id }}

      - name: Subir video generado (artefacto, por si falla la publicacion)
        uses: actions/upload-artifact@v4
        with:
          name: video-tema-${{ steps.tema.outputs.id }}-run${{ github.run_number }}
          path: output/*.mp4
