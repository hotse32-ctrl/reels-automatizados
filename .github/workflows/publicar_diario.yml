name: Generar y Publicar Reel Diario

on:
  schedule:
    - cron: '0 10 * * *'  # Todos los dias a las 10:00 AM UTC
  workflow_dispatch:  # Para ejecutar manualmente desde GitHub

jobs:
  generar-y-publicar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install requests google-generativeai Pillow "moviepy==1.0.3" "imageio_ffmpeg" gTTS google-auth-oauthlib google-api-python-client
          sudo apt-get update && sudo apt-get install -y ffmpeg imagemagick
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/' /etc/ImageMagick-6/policy.xml || true

      - name: Ejecutar script de generacion y publicacion
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
        run: python generar_y_publicar.py

      - name: Subir video generado (artefacto, por si falla la publicacion)
        uses: actions/upload-artifact@v4
        with:
          name: video-generado
          path: output/reel_final.mp4
