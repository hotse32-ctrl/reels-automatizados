name: Probar Pipeline V2 (sin publicar)

on:
  workflow_dispatch:
    inputs:
      tema:
        description: 'ID del tema a probar (1-10)'
        required: true
        default: '1'

jobs:
  probar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install requests google-generativeai Pillow numpy "moviepy==1.0.3" imageio_ffmpeg gTTS

      - name: Ejecutar pipeline nuevo (sin publicar, solo generar video)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generar_reel_v2.py --tema ${{ github.event.inputs.tema }} --no-publicar

      - name: Subir video generado como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: reel-prueba-tema-${{ github.event.inputs.tema }}
          path: output/*.mp4
